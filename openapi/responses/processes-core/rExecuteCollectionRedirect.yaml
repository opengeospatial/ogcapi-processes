description: For _Collection Output_ execution, redirection to an OGC API landing page or collection.
headers:
  Location:
    schema:
      type: string
    description: |-
      Location for redirection to an [OGC API collection description](https://github.com/opengeospatial/ogcapi-common/blob/master/collections/openapi/schemas/common-geodata/collectionDesc.yaml) (for `response=collection`) as described in
      [OGC API - Common - Part 2: Geospatial data](http://docs.ogc.org/DRAFTS/20-024.html#collection-description).
      The collection redirected to must contain links to at least one data access mechanism (such as
      [_OGC API - Tiles_](https://docs.ogc.org/is/20-057/20-057.html),
      [_DGGS_](https://docs.ogc.org/is/21-038r1/21-038r1.html),
      [_Coverages_](http://docs.ogc.org/DRAFTS/19-087.html),
      [_Features_](https://docs.opengeospatial.org/is/17-069r4/17-069r4.html),
      [_EDR_](https://docs.ogc.org/is/19-086r5/19-086r5.html), or
      [_Maps_](https://docs.ogc.org/is/20-058/20-058.html)...) to retrieve output results, which may
      trigger on-demand processing.
